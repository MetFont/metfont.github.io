name: Website

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Font build (only for main push / deployment) ---
      - uses: actions/setup-python@v5
        if: github.event_name != 'pull_request'
        with:
          python-version: '3.11'
          cache: pip

      - name: Install font build dependencies
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get update && sudo apt-get install -y woff2 inkscape
          pip install nanoemoji picosvg fonttools lxml

      - name: Build fonts
        if: github.event_name != 'pull_request'
        run: |
          python3 helpers/assign-codepoints.py
          python3 helpers/clean-sources.py
          python3 helpers/normalize-svg.py \
            --input-dir src/ \
            --mapping data/codepoint-map.json \
            --output-dir color/svg/
          python3 helpers/generate-fonts.py ${{ github.ref_name }}

      - name: Copy fonts to site
        if: github.event_name != 'pull_request'
        run: npm run copy-fonts

      # --- Site build (all triggers) ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Generate glyph data
        run: npm run generate-glyphs

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
