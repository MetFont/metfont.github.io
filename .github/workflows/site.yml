name: Website

on:
  pull_request:
    paths:
      - '.vitepress/**'
      - 'components/**'
      - '.github/workflows/site.yml'
  push:
    branches: [main]
    paths:
      - '.vitepress/**'
      - 'components/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download font package
        run: |
          ASSET_URL=$(curl -sL "https://api.github.com/repos/MetFont/metfont/releases/latest" \
            | python3 -c "import sys,json; print(next(a['browser_download_url'] for a in json.load(sys.stdin)['assets'] if a['name'].endswith('.zip')))")
          curl -sL "$ASSET_URL" -o MetFont.zip
          unzip -o MetFont.zip -d font/
          # Copy fonts and metadata to public/
          mkdir -p public
          find font/ -maxdepth 2 -type f \( -name '*.woff2' -o -name '*.ttf' \) -exec cp {} public/ \;
          cp font/metadata.json public/metadata.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
