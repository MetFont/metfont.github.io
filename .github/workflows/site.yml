name: Website

on:
  pull_request:
    paths:
      - 'site/**'
      - '.vitepress/**'
      - '.github/workflows/site.yml'
      # Also run when font files change (fonts must be rebuilt for site)
      - 'src/**'
      - 'helpers/**'
      - 'vendor/**'
      - 'data/**'
      - 'font/VERSION'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.vitepress/**'
      - '.github/workflows/site.yml'
      - 'src/**'
      - 'helpers/**'
      - 'vendor/**'
      - 'data/**'
      - 'font/VERSION'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Python (always needed — for download fallback parsing and glyph data) ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # --- Font build (main branch push / workflow dispatch) ---
      - name: Install font build dependencies
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get update && sudo apt-get install -y woff2 inkscape
          pip install nanoemoji picosvg fonttools lxml

      - name: Build fonts
        if: github.event_name != 'pull_request'
        run: |
          python3 helpers/assign-codepoints.py
          python3 helpers/clean-sources.py
          npm run prepare-fonts
          python3 helpers/generate-fonts.py ${{ github.ref_name }}

      - name: Copy fonts to site
        if: github.event_name != 'pull_request'
        run: npm run copy-fonts

      # --- Download fonts from GitHub Release (future: separate font repo) ---
      # For PRs: download from latest release if available, else build locally.
      - name: Download fonts from latest release
        if: github.event_name == 'pull_request'
        run: |
          set +e
          chmod +x helpers/download-fonts-for-site.sh
          if helpers/download-fonts-for-site.sh; then
            echo "Fonts downloaded from release"
          else
            echo "No release found — building fonts locally"
            sudo apt-get update && sudo apt-get install -y woff2 inkscape
            pip install nanoemoji picosvg fonttools lxml
            python3 helpers/assign-codepoints.py
            python3 helpers/clean-sources.py
            npm run prepare-fonts
            python3 helpers/generate-fonts.py ${{ github.ref_name }}
            npm run copy-fonts
          fi

      # --- Site build (all triggers) ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Generate glyph data
        run: npm run generate-glyphs

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
