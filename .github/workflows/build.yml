name: Build Fonts

on:
  pull_request:
    paths:
      - 'src/**'
      - 'helpers/**'
      - 'vendor/**'
      - 'data/**'
      - 'font/VERSION'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y woff2 inkscape

      - name: Install Python dependencies
        run: pip install nanoemoji picosvg fonttools lxml

      - name: Assign codepoints
        run: python3 helpers/assign-codepoints.py

      - name: Clean upstream SVGs
        run: python3 helpers/clean-sources.py

      - name: Prepare font-ready SVGs
        run: npm run prepare-fonts

      - name: Generate fonts
        run: python3 helpers/generate-fonts.py ${{ github.ref_name }}

      - name: Upload font artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: font/
          retention-days: 7
